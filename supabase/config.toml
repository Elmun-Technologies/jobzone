# Supabase local config. Regenerate/upgrade with `supabase init` if the CLI
# reports schema drift. Migrations live in ./migrations, functions in ./functions.
project_id = "jobzone"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["io.jobzone.jobzone://login-callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

[edge_runtime]
enabled = true
policy = "oneshot"

[functions.meili-sync]
verify_jwt = false

[functions.meili-reindex]
verify_jwt = false

# Legacy Meili proxy, not called by any shipping client; gated by the
# fail-closed EDGE_SHARED_SECRET instead (see supabase/functions/_shared/auth.ts).
[functions.search-jobs]
verify_jwt = false

[functions.send-notification]
verify_jwt = false

# Server-to-server: invoked by DB triggers (pg_net) with no user JWT, so JWT
# verification must be off. They are instead gated by the fail-closed
# EDGE_SHARED_SECRET (see supabase/functions/_shared/auth.ts).
[functions.notify-dispatch]
verify_jwt = false

[functions.push-dispatch]
verify_jwt = false

# Telegram calls this webhook with no JWT; its security is the one-time /start
# link-token handshake.
[functions.telegram-webhook]
verify_jwt = false

# Supabase Auth's Send-SMS hook calls this with a Standard-Webhooks HMAC
# signature (SEND_SMS_HOOK_SECRET) — no user JWT, so verification must be off
# or the platform rejects the hook call before the function runs.
[functions.send-sms-hook]
verify_jwt = false

# Invoked by a scheduler (cron/pg_net) with no user JWT; gated by the
# fail-closed EDGE_SHARED_SECRET instead.
[functions.saved-search-alerts]
verify_jwt = false

# Invoked by the jobs AFTER-INSERT/UPDATE trigger (pg_net, migration 0058)
# with no user JWT; gated by the fail-closed EDGE_SHARED_SECRET instead.
[functions.telegram-channel-post]
verify_jwt = false
