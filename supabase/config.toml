# Supabase local config. Regenerate/upgrade with `supabase init` if the CLI
# reports schema drift. Migrations live in ./migrations, functions in ./functions.
project_id = "jobzone"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["io.jobzone.app://login-callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

[edge_runtime]
enabled = true
policy = "oneshot"

[functions.meili-sync]
verify_jwt = false

[functions.meili-reindex]
verify_jwt = false

[functions.search-jobs]
verify_jwt = false

[functions.send-notification]
verify_jwt = false
