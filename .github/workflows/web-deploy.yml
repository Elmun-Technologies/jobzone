name: Deploy web preview

# Builds the Flutter web app and publishes it to GitHub Pages so the project
# can be viewed live at https://elmun-technologies.github.io/jobzone/.
# The app runs in offline/mock mode in the browser (no backend needed).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.2
          cache: true
      - run: flutter pub get
      # base-href must match the project-pages path (/<repo>/). The Supabase
      # publishable key is client-safe (RLS-protected, shipped in the bundle),
      # so it's passed inline; move it to a repo Variable later if preferred.
      - run: >
          flutter build web --release --base-href /jobzone/
          --dart-define=SUPABASE_URL=https://wajotaeoulizhveparhz.supabase.co
          --dart-define=SUPABASE_ANON_KEY=sb_publishable_YctSfyzY4fyj-Wbc8AMufA_4ZQE1tOP
      # enablement: true asks the action to turn on GitHub Pages (Actions
      # source) automatically, so the first deploy doesn't require toggling it
      # by hand in Settings → Pages.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web
      - id: deploy
        uses: actions/deploy-pages@v4
