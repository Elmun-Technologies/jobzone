name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  flutter:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.2
          cache: true
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: flutter analyze
      - run: flutter test
      - name: Check formatting (tracked Dart files; generated is gitignored)
        run: dart format --set-exit-if-changed $(git ls-files '*.dart')
