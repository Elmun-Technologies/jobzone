<!DOCTYPE html><html><head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Yollla — find your next job.">

  <!--
    The production Yollla site is the Next.js webapp on Vercel; this Flutter
    web build is only a preview/offline demo of the mobile app. Any real user
    who lands here (an old bookmark, a stale search result) is redirected to
    the webapp so employer sign-up etc. lands on the right surface. Pass
    ?keep=flutter or #keep=flutter to bypass and use the Flutter build
    directly. Noindex keeps Google from surfacing this preview.
  -->
  <meta name="robots" content="noindex, nofollow">
  <script>
    (function () {
      try {
        var here = new URL(window.location.href);
        if (
          here.searchParams.get("keep") === "flutter" ||
          (here.hash || "").indexOf("keep=flutter") !== -1
        ) {
          return;
        }
        var WEBAPP = "https://jobzone-virid.vercel.app";
        // Supabase can land an OAuth / magic-link code here (its Site URL
        // still points at this build). Hand the code to the webapp's
        // /auth/callback so the session actually completes there — and drop
        // Flutter's #/... hash route. NOTE: build the URL as string
        // concatenation, never target.pathname += search, or the "?" gets
        // percent-encoded into the path (%3Fcode=...) and 404s.
        if (here.searchParams.get("code") || here.searchParams.get("error")) {
          window.location.replace(WEBAPP + "/auth/callback" + here.search);
          return;
        }
        var path = here.pathname.replace(/^\/jobzone\/?/, "/");
        window.location.replace(WEBAPP + path + here.search);
      } catch (_) {}
    })();
  </script>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Yollla">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <title>Yollla</title>
  <link rel="manifest" href="manifest.json">
  
  
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  
  
  
  
  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #0A0A0A;
          background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: #0A0A0A;
          }
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
</head>
<body>
  <picture id="splash">
      <source srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x" media="(prefers-color-scheme: light)">
      <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">
      <img class="center" aria-hidden="true" src="splash/img/light-1x.png" alt="">
  </picture>

</body></html>
