<svg width="320" height="300" viewBox="0 0 320 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Slide 2 — Explore jobs through an interactive map -->
  <rect x="24" y="18" width="272" height="264" rx="36" fill="#EFF0F3"/>

  <!-- Map surface -->
  <rect x="52" y="46" width="216" height="208" rx="28" fill="#FFFFFF"/>
  <rect x="52" y="46" width="216" height="208" rx="28" stroke="#0A0A0A" stroke-width="3"/>

  <!-- Streets / blocks -->
  <path d="M52 120 H268" stroke="#E2E4EA" stroke-width="10" stroke-linecap="round"/>
  <path d="M148 46 V254" stroke="#E2E4EA" stroke-width="10" stroke-linecap="round"/>
  <path d="M52 196 H268" stroke="#E2E4EA" stroke-width="8" stroke-linecap="round"/>
  <path d="M212 46 V254" stroke="#E2E4EA" stroke-width="8" stroke-linecap="round"/>

  <!-- Dashed route -->
  <path d="M96 214 C96 170 148 176 148 140 C148 108 196 110 214 92"
        stroke="#0A0A0A" stroke-width="3" stroke-linecap="round"
        stroke-dasharray="2 10"/>

  <!-- "You are here" pulse -->
  <circle cx="96" cy="214" r="18" fill="#C7FB00" opacity="0.3"/>
  <circle cx="96" cy="214" r="7" fill="#0A0A0A"/>
  <circle cx="96" cy="214" r="2.5" fill="#FFFFFF"/>

  <!-- Secondary pin -->
  <path d="M210 150 c0 15 -16 26 -16 26 s-16 -11 -16 -26 a16 16 0 0 1 32 0 z" fill="#0A0A0A"/>
  <circle cx="194" cy="150" r="6" fill="#FFFFFF"/>

  <!-- Primary volt pin (the highlighted job) -->
  <path d="M230 78 c0 20 -22 34 -22 34 s-22 -14 -22 -34 a22 22 0 0 1 44 0 z" fill="#C7FB00"/>
  <path d="M230 78 c0 20 -22 34 -22 34 s-22 -14 -22 -34 a22 22 0 0 1 44 0 z" stroke="#0A0A0A" stroke-width="3"/>
  <circle cx="208" cy="78" r="8" fill="#0A0A0A"/>
</svg>
