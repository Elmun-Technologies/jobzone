<svg width="320" height="300" viewBox="0 0 320 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Slide 1 — Discover your dream job by exploring categories -->
  <!-- Soft framed panel so the art reads on both light and dark app backgrounds -->
  <rect x="24" y="18" width="272" height="264" rx="36" fill="#EFF0F3"/>
  <circle cx="66" cy="60" r="30" fill="#C7FB00" opacity="0.35"/>
  <circle cx="262" cy="238" r="22" fill="#C7FB00" opacity="0.28"/>

  <!-- Phone / app card -->
  <rect x="86" y="46" width="148" height="208" rx="24" fill="#FFFFFF"/>
  <rect x="86" y="46" width="148" height="208" rx="24" stroke="#0A0A0A" stroke-width="3"/>

  <!-- Search bar -->
  <rect x="104" y="66" width="112" height="22" rx="11" fill="#F3F3F1"/>
  <circle cx="118" cy="77" r="6" fill="none" stroke="#0A0A0A" stroke-width="2.5"/>
  <line x1="122.5" y1="81.5" x2="127" y2="86" stroke="#0A0A0A" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Category grid: two columns, three rows -->
  <rect x="104" y="102" width="52" height="42" rx="12" fill="#C7FB00"/>
  <rect x="116" y="114" width="18" height="18" rx="5" fill="#0A0A0A"/>

  <rect x="164" y="102" width="52" height="42" rx="12" fill="#F3F3F1"/>
  <rect x="176" y="114" width="18" height="18" rx="5" fill="#C9CBD3"/>

  <rect x="104" y="152" width="52" height="42" rx="12" fill="#F3F3F1"/>
  <rect x="116" y="164" width="18" height="18" rx="5" fill="#C9CBD3"/>

  <rect x="164" y="152" width="52" height="42" rx="12" fill="#0A0A0A"/>
  <rect x="176" y="164" width="18" height="18" rx="5" fill="#C7FB00"/>

  <rect x="104" y="202" width="52" height="34" rx="12" fill="#F3F3F1"/>
  <rect x="164" y="202" width="52" height="34" rx="12" fill="#F3F3F1"/>

  <!-- Spark accent -->
  <path d="M250 70 l5 12 12 5 -12 5 -5 12 -5 -12 -12 -5 12 -5 z" fill="#0A0A0A"/>
</svg>
