org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# Yandex MapKit SDK variant. Must be `full`: the yandex_mapkit 4.2.1 plugin's
# controller unconditionally references traffic + user-location listeners
# (TrafficListener, UserLocationObjectListener, …) that the `lite` SDK bundle
# does not ship, so a `lite` Android build fails to compile. `full` carries
# those classes.
yandexMapkit.variant=full
